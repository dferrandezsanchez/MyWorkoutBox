name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, test, coverage and build
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci-root-password
          MYSQL_DATABASE: myworkoutbox_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pci-root-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql://root:ci-root-password@127.0.0.1:3306/myworkoutbox_test
      JWT_SECRET: ci-only-secret
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend install
        working-directory: backend
        run: npm ci

      - name: Backend database setup
        working-directory: backend
        run: |
          npm run prisma:generate
          npx prisma migrate deploy

      - name: Backend quality
        working-directory: backend
        run: npm run quality

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend quality
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:3000
        run: npm run quality

      - name: Validate Docker runtime
        run: |
          docker compose --env-file .env.docker.example config --quiet
          docker build --tag myworkoutbox-backend:ci backend
          docker build --tag myworkoutbox-frontend:ci frontend
          docker run --rm --entrypoint sh myworkoutbox-frontend:ci \
            -c 'test "$(stat -c %a /etc/nginx/conf.d/default.conf)" = 644 && test -r /etc/nginx/conf.d/default.conf && grep -q "no-store, no-cache, must-revalidate" /etc/nginx/conf.d/default.conf && grep -q "public, immutable" /etc/nginx/conf.d/default.conf'
