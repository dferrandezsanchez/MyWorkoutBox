name: Release deploy

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Build and test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci-root-password
          MYSQL_DATABASE: myworkoutbox_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pci-root-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql://root:ci-root-password@127.0.0.1:3306/myworkoutbox_test
      JWT_SECRET: ci-only-secret
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend install
        working-directory: backend
        run: npm ci

      - name: Backend database setup
        working-directory: backend
        run: |
          npm run prisma:generate
          npx prisma migrate deploy

      - name: Backend build
        working-directory: backend
        run: npm run build

      - name: Backend tests
        working-directory: backend
        run: npm test

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Frontend tests
        working-directory: frontend
        run: npm test

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          RELEASE_REF: ${{ github.ref_name }}
          APP_PATH: ${{ secrets.APP_PATH }}
          FRONTEND_PUBLIC_PATH: ${{ secrets.FRONTEND_PUBLIC_PATH }}
          SYSTEMD_SERVICE_NAME: ${{ secrets.SYSTEMD_SERVICE_NAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          PORT: ${{ secrets.PORT }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: RELEASE_REF,APP_PATH,FRONTEND_PUBLIC_PATH,SYSTEMD_SERVICE_NAME,DATABASE_URL,JWT_SECRET,JWT_EXPIRES_IN,CORS_ORIGIN,PORT,VITE_API_URL
          script_stop: true
          script: |
            cd "$APP_PATH/repo"
            git fetch --tags origin
            git checkout "$RELEASE_REF"
            chmod +x scripts/deploy-release.sh
            ./scripts/deploy-release.sh
