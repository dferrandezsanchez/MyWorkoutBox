name: Release deploy

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Build and test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci-root-password
          MYSQL_DATABASE: myworkoutbox_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pci-root-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql://root:ci-root-password@127.0.0.1:3306/myworkoutbox_test
      JWT_SECRET: ci-only-secret
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify release commit belongs to main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend install
        working-directory: backend
        run: npm ci

      - name: Backend database setup
        working-directory: backend
        run: |
          npm run prisma:generate
          npx prisma migrate deploy

      - name: Backend quality
        working-directory: backend
        run: npm run quality

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend quality
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run quality

      - name: Validate Docker runtime
        run: |
          docker compose --env-file .env.docker.example config --quiet
          docker build --tag myworkoutbox-backend:ci backend
          docker build --tag myworkoutbox-frontend:ci frontend
          docker run --rm --entrypoint sh myworkoutbox-frontend:ci \
            -c 'test "$(stat -c %a /etc/nginx/conf.d/default.conf)" = 644 && test -r /etc/nginx/conf.d/default.conf && grep -q "no-store, no-cache, must-revalidate" /etc/nginx/conf.d/default.conf && grep -q "public, immutable" /etc/nginx/conf.d/default.conf'

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Deploy over SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          RELEASE_REF: ${{ github.ref_name }}
          APP_PATH: ${{ secrets.APP_PATH }}
          DOCKER_ENV_FILE: ${{ secrets.DOCKER_ENV_FILE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: RELEASE_REF,APP_PATH,DOCKER_ENV_FILE
          script: |
            set -e
            cd "$APP_PATH/repo"
            git fetch --tags origin
            git checkout "$RELEASE_REF"
            chmod +x scripts/deploy-release.sh
            ./scripts/deploy-release.sh
